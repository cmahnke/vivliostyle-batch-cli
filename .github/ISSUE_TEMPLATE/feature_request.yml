name: 🚀 Feature Request
description: Suggest a new feature or improvement for vivliostyle-batch-cli
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! 💡
        Please describe your idea as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: 🔍 Problem Description
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution or feature you would like.
      placeholder: "It would be great if the plugin could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Describe any alternative solutions or workarounds you have tried.
      placeholder: "I tried using... but it doesn't work because..."
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: 📝 Example Use Case
      description: Show how the feature would be used.
      placeholder: provide examples in a singel and looped call if possible
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Add any other context, screenshots, or references here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: I have checked existing issues and this feature has not been requested yet
          required: true
        - label: This feature would be useful to other users, not just my specific use case
          required: false
