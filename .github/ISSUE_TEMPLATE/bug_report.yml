name: 🐞 Bug Report
description: Report a bug or unexpected behavior in vivliostyle-batch-cli
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🙏
        Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: 🐞 Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I use CLI to create / preview a PDF file, it throws..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Clone example repository from ...
        2. Run `npx vivliostyle-cli` with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
      placeholder: "The transformation resulted in a PDF file"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened?
      placeholder: "The build / preview fails with the following error..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Error Logs
      description: Paste any relevant error logs here.
      render: shell
      placeholder: "[!] Error: ..."
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: 📦  Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: 🟢 Node.js Version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context, screenshots, or file structure here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: I am using the latest version of the plugin
          required: true
        - label: I have checked existing issues for duplicates
          required: true
        - label: I have included a minimal reproducible example
          required: false
