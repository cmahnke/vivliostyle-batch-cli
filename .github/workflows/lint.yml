name: Lint and publish example

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: write
  id-token: write
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
      - run: |
          npm i
          npm run lint
          npm run format
          npm run test
          npx tsc -b --verbose
          npx rollup --config
          npx prettier --check .
          npm run build
      - name: Run publish dry run
        continue-on-error: true
        run: |
          npm publish --dry-run

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
      - name: Test
        run: |
          npm i
          npm run test

  bun:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          bun install --ignore-scripts
      - name: Run linters
        run: |
          bun run lint
      - name: Run build
        run: |
          bun run build
      - name: Run test
        run: |
          bun run test

  deno:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: |
          deno install
      - name: Run linters
        run: |
          deno run lint
      - name: Run build
        run: |
          deno run build
      - name: Run test
        run: |
          deno run test
